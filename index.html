<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Inventario de Red</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1>Panel de Inventario de Hardware de Red</h1>
        <button class="btn-add">Añadir nuevo dispositivo ➕</button>
    </div>

    <div class="controls-bar">
        <div class="search-box">
            <input type="text" id="buscador" placeholder="🔍 Buscar hardware (Marca, Modelo, IP...)">
            <button class="btn-add" id="btnLimpiar">Limpiar</button>
        </div>
        
        <select id="filtroTipo">
            <option value="Todos">Todos los tipos</option>
            <option value="Router">Router</option>
            <option value="Switch">Switch</option>
            <option value="Firewall">Firewall</option>
            <option value="Access Point">Access Point</option>
        </select>

        <div class="stats">
            Dispositivos totales: <strong id="contadorEquipos" style="color: #1f2937; font-size: 1.1rem;">0</strong>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo de dispositivo</th>
                    <th>Marca y modelo</th>
                    <th>Dirección IP</th>
                    <th>Ubicación</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
