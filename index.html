<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Inventario de Red</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Centro de Datos - Inventario</h1>
        <p>Total equipos: <strong id="contadorEquipos">0</strong></p>
    </div>

    <div class="controls">
        <input type="text" id="buscador" placeholder="Buscar por marca, modelo o IP...">
        <select id="filtroTipo">
            <option value="Todos">Todos los tipos</option>
            <option value="Router">Routers</option>
            <option value="Switch">Switches</option>
            <option value="Firewall">Firewalls</option>
            <option value="Access Point">Access Points</option>
            <option value="Servidor">Servidores</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Marca & Modelo</th>
                    <th>Dirección IP</th>
                    <th>Ubicación</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
